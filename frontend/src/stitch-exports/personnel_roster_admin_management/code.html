<!DOCTYPE html>

<title>Personnel Roster</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<main class="w-full max-w-container-max mx-auto px-gutter py-stack-lg">
<!-- Header & Search -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-stack-md mb-stack-lg border-b border-border-subtle pb-stack-md">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Personnel Roster</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Manage and audit registered platform users.</p>
</div>
<div class="relative w-full md:w-96">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant pointer-events-none material-symbols-outlined">search</span>
<input class="w-full bg-surface-container border border-border-subtle rounded text-on-surface placeholder-on-surface-variant pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md transition-shadow" placeholder="Search Discord ID or Arma Name..." type="text"/>
</div>
</div>
<!-- Roster Table Card -->
<div class="bg-surface-container border border-border-subtle rounded-xl overflow-hidden shadow-sm">
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="border-b border-border-subtle bg-surface-container-highest">
<th class="font-label-sm text-label-sm text-on-surface-variant uppercase py-3 px-6 whitespace-nowrap">Discord Account</th>
<th class="font-label-sm text-label-sm text-on-surface-variant uppercase py-3 px-6 whitespace-nowrap">Arma Character</th>
<th class="font-label-sm text-label-sm text-on-surface-variant uppercase py-3 px-6 whitespace-nowrap">Rank / Role</th>
<th class="font-label-sm text-label-sm text-on-surface-variant uppercase py-3 px-6 whitespace-nowrap text-center">Warnings</th>
<th class="font-label-sm text-label-sm text-on-surface-variant uppercase py-3 px-6 whitespace-nowrap text-right">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-border-subtle">
<!-- Row 1 -->
<tr class="hover:bg-surface-container-highest/50 transition-colors group">
<td class="py-4 px-6 whitespace-nowrap">
<div class="flex items-center gap-3">
<img alt="User Avatar" class="w-8 h-8 rounded-full border border-border-subtle object-cover" data-alt="A small, stylized avatar image of a male with short hair, conveying a professional yet approachable demeanor. The lighting is soft and neutral, typical of a profile picture, against a slightly muted blue background. The aesthetic fits a modern, serious management interface, feeling clean and digitally native." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbytRc-taZSIV4Y-TVcfgqYJJA7umKF9UGNIi-IQyhhbSwnVNSPq4iAejGpw5oqvbbcOzFpUvYQyPtUOj3GwVt5SJxLcrsNMaUMSkvRR0oE97lyz5wqVPasScfMK3tUPXCr258eMIKwBanYhHm3W9V6ornvQDGJZhLZ7N0F8Pc896SAcipMti2SloM_Q-L1_cmaEww58pt-f009B1SROoLXcR4B-ppOwQ1-5RP118YGqEVf1s9V1qaD629f5YPUgSqUm46Emp81Vs"/>
<span class="font-label-md text-label-md font-medium text-on-surface">Dave#1234</span>
</div>
</td>
<td class="py-4 px-6 whitespace-nowrap">
<span class="font-body-md text-body-md text-on-surface">[TBD] Admin Dave</span>
</td>
<td class="py-4 px-6 whitespace-nowrap">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-primary-container/20 text-primary border border-primary/30">
                                    Platform Admin
                                </span>
</td>
<td class="py-4 px-6 whitespace-nowrap text-center">
<span class="font-code-md text-code-md text-on-surface-variant">0</span>
</td>
<td class="py-4 px-6 whitespace-nowrap text-right">
<div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="px-3 py-1.5 text-sm font-medium text-on-surface border border-border-subtle rounded hover:bg-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
                                        Edit User
                                    </button>
<button class="px-3 py-1.5 text-sm font-medium text-white bg-error rounded hover:bg-error/90 transition-colors focus:outline-none focus:ring-2 focus:ring-error/50">
                                        Ban
                                    </button>
</div>
</td>
</tr>
<!-- Row 2 -->
<tr class="hover:bg-surface-container-highest/50 transition-colors group">
<td class="py-4 px-6 whitespace-nowrap">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full border border-border-subtle bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">person</span>
</div>
<span class="font-label-md text-label-md font-medium text-on-surface">RandomGuy#9999</span>
</div>
</td>
<td class="py-4 px-6 whitespace-nowrap">
<span class="font-body-md text-body-md text-error/80 italic">Unlinked</span>
</td>
<td class="py-4 px-6 whitespace-nowrap">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-surface-variant text-on-surface-variant border border-border-subtle">
                                    Enlisted
                                </span>
</td>
<td class="py-4 px-6 whitespace-nowrap text-center">
<span class="font-code-md text-code-md text-[#eab308]">1</span>
</td>
<td class="py-4 px-6 whitespace-nowrap text-right">
<div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="px-3 py-1.5 text-sm font-medium text-on-surface border border-border-subtle rounded hover:bg-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
                                        Edit User
                                    </button>
<button class="px-3 py-1.5 text-sm font-medium text-white bg-error rounded hover:bg-error/90 transition-colors focus:outline-none focus:ring-2 focus:ring-error/50">
                                        Ban
                                    </button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
<!-- Pagination / Footer area (Optional but good for data density UI) -->
<div class="border-t border-border-subtle bg-surface-container-highest/30 px-6 py-3 flex items-center justify-between">
<p class="font-label-sm text-label-sm text-on-surface-variant">Showing 2 of 2 entries</p>
<div class="flex gap-2">
<button class="p-1 text-on-surface-variant hover:text-on-surface disabled:opacity-50" disabled="">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="p-1 text-on-surface-variant hover:text-on-surface disabled:opacity-50" disabled="">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
</div>
</main>
</body></html>
