<!DOCTYPE html>

<body class="bg-surface text-on-surface font-body-md min-h-screen">
<main class="p-container-padding max-w-7xl mx-auto space-y-8">
<!-- Header & Tabs -->
<header class="space-y-6">
<div>
<h1 class="text-3xl font-bold tracking-tight text-on-surface">Mission Library</h1>
<p class="text-on-surface-variant mt-2">Browse, filter, and deploy active operations.</p>
</div>
<!-- Custom Tab Navigation -->
<nav class="flex border-b border-border-subtle overflow-x-auto hide-scrollbar">
<button class="px-6 py-3 border-b-2 border-primary text-primary font-nav-breadcrumb-current whitespace-nowrap">Global Missions</button>
<button class="px-6 py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors font-menu-item whitespace-nowrap">My Missions</button>
<button class="px-6 py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors font-menu-item whitespace-nowrap">Bookmarked</button>
</nav>
</header>
<!-- Filter Console (Glassmorphism inspired card) -->
<section class="bg-[#1f2937] border border-border-subtle rounded-xl p-6 shadow-sm backdrop-blur-sm">
<div class="flex flex-col md:flex-row gap-4 items-end">
<!-- Search Input -->
<div class="flex-1 w-full relative">
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-2" for="mission-search">Search Operations</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">search</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface pl-10 py-2 focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="mission-search" placeholder="Enter mission name or author..." type="text"/>
</div>
</div>
<!-- Dropdowns -->
<div class="flex flex-wrap md:flex-nowrap gap-4 w-full md:w-auto">
<div class="flex-1 md:flex-none md:w-40">
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-2" for="filter-terrain">Terrain</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface py-2 pl-3 pr-8 focus:ring-1 focus:ring-primary focus:border-primary transition-colors appearance-none cursor-pointer bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23c2c6d6%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1em_1em] bg-[right_0.5rem_center] bg-no-repeat" id="filter-terrain">
<option>All</option>
<option>Everon</option>
<option>Arland</option>
<option>Custom Map</option>
</select>
</div>
<div class="flex-1 md:flex-none md:w-40">
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-2" for="filter-mode">Mode</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface py-2 pl-3 pr-8 focus:ring-1 focus:ring-primary focus:border-primary transition-colors appearance-none cursor-pointer bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23c2c6d6%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1em_1em] bg-[right_0.5rem_center] bg-no-repeat" id="filter-mode">
<option>All</option>
<option>PvE / COOP</option>
<option>PvP</option>
<option>Zeus</option>
</select>
</div>
<div class="flex-1 md:flex-none md:w-40">
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-2" for="filter-players">Player Count</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded text-body-md font-body-md text-on-surface py-2 pl-3 pr-8 focus:ring-1 focus:ring-primary focus:border-primary transition-colors appearance-none cursor-pointer bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23c2c6d6%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1em_1em] bg-[right_0.5rem_center] bg-no-repeat" id="filter-players">
<option>All</option>
<option>1-16</option>
<option>17-32</option>
<option>33-64</option>
</select>
</div>
</div>
</div>
</section>
<!-- Mission Grid -->

                        [PvE / COOP]
                    </span>
</div>
<!-- Body -->
<div class="p-5 flex-1 flex flex-col">
<h3 class="text-lg font-bold text-on-surface mb-2 truncate">Operation Enduring Freedom</h3>
<!-- Author Info -->
<div class="flex items-center gap-3 mb-4">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant">

</div>
<span class="text-sm text-on-surface-variant font-medium">Admin Dave</span>
</div>
<!-- Meta Row -->
<div class="flex items-center gap-4 text-sm text-on-surface-variant mt-auto">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">map</span>
<span>Everon</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">group</span>
<span>64 Players max</span>
</div>
</div>
</div>
<!-- Footer -->
<div class="p-5 pt-0 mt-2">
<button class="w-full flex items-center justify-center gap-2 py-2 px-4 border border-outline-variant text-on-surface hover:bg-surface-container-high rounded transition-colors text-sm font-semibold">
                        View Operation Intel
                        <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</article>
<!-- Mission Card 2 -->
<article class="bg-[#1f2937] border border-border-subtle rounded-xl overflow-hidden flex flex-col group hover:border-outline-variant transition-colors">
<div class="relative h-48 w-full bg-surface-container-highest">
<img alt="Urban tactical map" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="A stylized, top-down tactical map view of an urban or industrial complex at night. Rendered in deep obsidian blacks and dark steel greys, with sharp, electric blue grid lines and glowing structural outlines. The image exudes a modern, high-tech command center aesthetic, suited for a serious tactical interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRGUZ7WmMQ4IeG3T-zCZSf5U2uu7-VABNfnZVeS-5EbFyMi0qhw6PhD9phbSx7DtRHU0M0U4MrtRrDHtLY9Y8Nu3VOIH3tVU7ALVvWflJqkFr-ertxhPvnOPU49DyNlCrW3heec6zFhGw7y7spB2tUUhJPKCzYt6eiOhPf5Id4u2rzkEku1iuDAKfznkgVIAGJWRIWMgMKM7nrEfOmp1l9TKiauZURU4VKK8a5z7M95wjD5IAFM8nSAZ_19UAIFinORXxrgTn9e04"/>
<span class="absolute top-4 right-4 bg-error text-on-error text-xs font-bold px-3 py-1 rounded-full shadow-md backdrop-blur-sm bg-opacity-90">
                        [PvP]
                    </span>
</div>
<div class="p-5 flex-1 flex flex-col">
<h3 class="text-lg font-bold text-on-surface mb-2 truncate">Urban Vanguard</h3>
<div class="flex items-center gap-3 mb-4">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="A sharp, low-key profile photo of a professional woman in a dark, minimalist setting. Lighting is dramatic and focused, highlighting her face against a pure black background. Fits seamlessly into a sleek, premium dark-mode UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAz4G8A9-FhhBxbKuLYLc00LUVZgzcRiOFFI5IL63LBPuYQUSkx6lPWYkpqP1_Y5Rfm19JBAQi-mNGPb6yMTohVwKFllqOi8oUM21AENJEE2H07D06oNuCFHJtWneGztK7dlKeUIAKWl4UF245x1xYfC3eb7y5cIatkCIN2HIJszAnj3tsONA3Cy8VfHTpY9_h8cvnuvsZxZQuBz-tMjR7RlsPgrn-DDQGUXP43XxgPl4VvLWriUIGopGNmLd3SP4gY9npUuRuBKok"/>
</div>
<span class="text-sm text-on-surface-variant font-medium">Sgt. Miller</span>
</div>
<div class="flex items-center gap-4 text-sm text-on-surface-variant mt-auto">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">map</span>
<span>Arland</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">group</span>
<span>32 Players max</span>
</div>
</div>
</div>
<div class="p-5 pt-0 mt-2">
<button class="w-full flex items-center justify-center gap-2 py-2 px-4 border border-outline-variant text-on-surface hover:bg-surface-container-high rounded transition-colors text-sm font-semibold">
                        View Operation Intel
                        <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</article>
<!-- Mission Card 3 -->
<article class="bg-[#1f2937] border border-border-subtle rounded-xl overflow-hidden flex flex-col group hover:border-outline-variant transition-colors">
<div class="relative h-48 w-full bg-surface-container-highest">
<img alt="Forest map" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="A dark, moody drone shot looking straight down over a dense, foggy pine forest at dusk. The colors are muted, relying on deep, near-black greens and shadows, creating an atmosphere of stealth and tension. Perfectly aligned with a premium, minimalist military application design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsVnG_HEuPS591GyBnnCdsg5n1a4fX_W7N6NlBMbCvZBel36Ucy09tvESsAU1CjKioN3iThddmuThJPzYSl1UYW-Zj9_OMr2FT9sXOheTroUAzDiJo2EZyCwa9RbC275_EOe6yHvvjcjNq-tLfwIYnM5YH37Sqx0NSm06Iv81AuYbaLPSmNJkFoUCNdK6Vh74wKccSMAem4YD2pdqOxbKFsiElXqPHn8mxLIBu-EaTSC2upQZgwRMCeLNTDFaM1G7bJ_2_zsXGUGw"/>
<span class="absolute top-4 right-4 bg-tertiary-container text-on-tertiary-container text-xs font-bold px-3 py-1 rounded-full shadow-md backdrop-blur-sm bg-opacity-90">
                        [Zeus]
                    </span>
</div>
<div class="p-5 flex-1 flex flex-col">
<h3 class="text-lg font-bold text-on-surface mb-2 truncate">Silent Watch</h3>
<div class="flex items-center gap-3 mb-4">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center border border-outline-variant text-on-surface-variant font-bold text-xs">
                             CM
                        </div>
<span class="text-sm text-on-surface-variant font-medium">Cmdr. Mitchell</span>
</div>
<div class="flex items-center gap-4 text-sm text-on-surface-variant mt-auto">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">map</span>
<span>Custom Map</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">group</span>
<span>16 Players max</span>
</div>
</div>
</div>
<div class="p-5 pt-0 mt-2">
<button class="w-full flex items-center justify-center gap-2 py-2 px-4 border border-outline-variant text-on-surface hover:bg-surface-container-high rounded transition-colors text-sm font-semibold">
