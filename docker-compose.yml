# Local development stack. Works with either `docker compose` or `podman compose`.
# Brings up Postgres for the Go API; the API runs the migrations on boot.
services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: tbd_reforger_db
    environment:
      POSTGRES_USER: tbd
      POSTGRES_PASSWORD: tbd
      POSTGRES_DB: tbd_reforger
    ports:
      # Host 5434 to avoid colliding with other local Postgres instances on 5432/5433.
      - "5434:5432"
    volumes:
      - tbd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbd -d tbd_reforger"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tbd_pgdata:
